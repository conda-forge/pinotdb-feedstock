context:
  name: pinotdb
  version: "9.1.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pinotdb-${{ version }}.tar.gz
  sha256: 525db22f2a4f4c04e1cbcc0b37cd8ff9c726f4bb4e1d5b77752afe6b1b3b968c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - poetry-core
  run:
    - python >=${{ python_min }},<4.0
    - ciso8601 >=2.1.3,<3.0.0
    - h11 0.16.0.*
    - httpx >=0.28.1,<0.29
    - requests >=2.25.0,<3.0.0
    - urllib3 ==2.6.3
tests:
  - python:
      imports:
        - pinotdb
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/python-pinot-dbapi/pinot-dbapi
  summary: Python DB-API and SQLAlchemy dialect for Pinot.
  license: MIT
  license_file: LICENSE
  documentation: http://kylin.apache.org/docs/
  repository: https://github.com/python-pinot-dbapi/pinot-dbapi

extra:
  recipe-maintainers:
    - xylar
